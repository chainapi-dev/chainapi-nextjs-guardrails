name: Bug Report
description: Report a problem with a rule file, glob pattern, frontmatter, or anti-pattern snippet.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Search existing issues before submitting.

  - type: input
    id: rule-file
    attributes:
      label: Affected file
      description: Which .mdc file, AGENTS.md, or CLAUDE.md has the issue?
      placeholder: "301-database-migrations.mdc"
    validations:
      required: true

  - type: dropdown
    id: bug-type
    attributes:
      label: Bug type
      options:
        - Incorrect glob pattern (rule not activating on expected files)
        - Non-recursive glob (missing ** prefix)
        - Missing frontmatter key (description / globs / alwaysApply)
        - Anti-pattern code snippet contains an error
        - Rule directive conflicts with another rule
        - AGENTS.md or CLAUDE.md structural issue
        - CI workflow false positive or false negative
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What is wrong?
      description: Be specific — include the exact directive or snippet that is incorrect.
      placeholder: |
        In 200-nextjs-app-router.mdc the glob ["**/*.tsx","**/*.ts"] also fires on
        **.test.ts files, which should be scoped to 500-tdd-vitest.mdc only.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: cursor-version
    attributes:
      label: Cursor version
      placeholder: "0.50.x"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.2 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am reporting a problem with the rule files, not my own project's AI output
          required: true
