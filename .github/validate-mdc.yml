name: Validate MDC Rules

on:
  push:
    branches: [main]
    paths:
      - "preview/**/*.mdc"
  pull_request:
    branches: [main]
    paths:
      - "preview/**/*.mdc"

permissions:
  contents: read

jobs:
  validate-frontmatter:
    name: Frontmatter lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate .mdc frontmatter
        run: |
          python3 - << 'PYEOF'
          import os, sys, re, pathlib

          REQUIRED_KEYS = {"description", "globs", "alwaysApply"}
          BARE_GLOB_RE  = re.compile(r'globs:\s*"?\*"?(?!\*)')
          ANTIPATTERN   = re.compile(r'^##\s+Anti-Patterns', re.MULTILINE)

          errors = []
          warnings = []
          mdc_files = list(pathlib.Path("preview").rglob("*.mdc"))

          if not mdc_files:
              print("No .mdc files found in /preview — skipping.")
              sys.exit(0)

          for path in sorted(mdc_files):
              content = path.read_text(encoding="utf-8")

              if not content.startswith("---"):
                  errors.append(f"{path}: Missing YAML frontmatter '---'")
                  continue

              try:
                  end_idx = content.index("---", 3)
              except ValueError:
                  errors.append(f"{path}: Frontmatter closing '---' not found")
                  continue

              fm = content[3:end_idx]
              found = {m.group(1) for m in re.finditer(r'^(\w+):', fm, re.MULTILINE)}
              missing = REQUIRED_KEYS - found

              if missing:
                  errors.append(f"{path}: Missing keys: {sorted(missing)}")

              if BARE_GLOB_RE.search(fm):
                  errors.append(
                      f'{path}: Non-recursive glob. '
                      f'Replace "*" with ["**/*"].'
                  )

              if not ANTIPATTERN.search(content):
                  warnings.append(f"{path}: Missing Anti-Patterns section.")

          for w in warnings:
              print(f"::warning::{w}")

          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)

          print(f"✓ {len(mdc_files)} .mdc file(s) passed validation.")
          PYEOF
